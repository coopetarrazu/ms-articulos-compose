namespace: inventario
images:
  - name: harbor.coopetarrazu.com:8443/ms-articulos
    newName: harbor.coopetarrazu.com:8443/cluster/prod/articulos/ms-articulos
    newTag: v1.0.3
resources:
  - ../../base

patches:
  - target:
      kind: Ingress
      name: ms-articulos-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api.coopetarrazu.com
      
      - op: replace
        path: /spec/rules/0/host
        value: api.coopetarrazu.com
      
      - op: replace
        path: /spec/tls/0/secretName
        value: api-ca
      
      - op: replace
        path: /spec/ingressClassName
        value: nginx-externo