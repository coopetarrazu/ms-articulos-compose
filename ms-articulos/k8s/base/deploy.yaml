apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-articulos-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-articulos
  template:
    metadata:
      labels:
        app: ms-articulos
    spec:
      volumes:
        - name: truststore
          secret:
            secretName: coopetarrazu-ca

      containers:
        - name: ms-articulos
          image: harbor.coopetarrazu.com:8443/ms-articulos:v1.0.0

          envFrom:
            - configMapRef:
                name: ms-config

          env:
            - name: JAVA_TOOL_OPTIONS
              value: >
                -Djavax.net.ssl.trustStore=/certs/truststore.jks
                -Djavax.net.ssl.trustStorePassword=changeit

          volumeMounts:
            - name: truststore
              mountPath: /certs

          ports:
            - containerPort: 80
          imagePullPolicy: Always



